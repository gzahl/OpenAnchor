name: Build APK & Deploy F-Droid Repo

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Run E2E Integration Tests
        run: npm test

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and sign APK
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: "1.0.0-build.${{ github.run_number }}"
        run: |
          cd android
          chmod +x gradlew
          # Build debug APK (pre-signed with Android debug key, valid for fdroid)
          ./gradlew assembleDebug
          mkdir -p $GITHUB_WORKSPACE/apk
          cp app/build/outputs/apk/debug/app-debug.apk \
            $GITHUB_WORKSPACE/apk/openanchor.apk

      - name: Install fdroidserver
        run: pip install fdroidserver qrcode Pillow

      - name: Build F-Droid repo
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE }}
          FDROID_KEYSTORE_PASSWORD: ${{ secrets.FDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          
          # Strictly verify that keystore secrets are present in GitHub Secrets
          if [ -z "$FDROID_KEYSTORE_BASE64" ] || [ -z "$FDROID_KEYSTORE_PASSWORD" ]; then
            echo "::error::F-Droid signing secrets (FDROID_KEYSTORE and FDROID_KEYSTORE_PASSWORD) are strictly required for key persistence but are missing in GitHub Repository Secrets! The build is terminated to prevent repository signature mismatches."
            exit 1
          fi
          
          # Create a clean build directory for fdroid
          mkdir -p fdroid-build/repo fdroid-build/metadata
          cp apk/openanchor.apk fdroid-build/repo/
          
          # Copy the custom app metadata file so F-Droid embeds detailed descriptions, links, and licenses
          cp metadata/org.openanchor.alarm.yml fdroid-build/metadata/
          
          cd fdroid-build

          # Decode the persistent keystore
          echo "Decoding persistent F-Droid keystore..."
          echo "$FDROID_KEYSTORE_BASE64" | base64 -d > repo.keystore

          # Initialize repo config (uses separate keystore for repo index signing)
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          fdroid init \
            --keystore repo.keystore \
            --repo-keyalias fdroid-repo \
            --no-prompt

          # Robustly overwrite repo name, description, URL and repo_icon in config.yml (handles commented out templates)
          sed -i 's|^#*[[:space:]]*repo_name:.*|repo_name: "OpenAnchor Official Repository"|g' config.yml
          sed -i 's|^#*[[:space:]]*repo_description:.*|repo_description: "Official F-Droid repository for the OpenAnchor boat alarm app. Source code is hosted on GitHub: https://github.com/gzahl/OpenAnchor"|g' config.yml
          sed -i 's|^#*[[:space:]]*repo_url:.*|repo_url: "https://gzahl.github.io/OpenAnchor/fdroid/repo"|g' config.yml
          sed -i 's|^#*[[:space:]]*repo_icon:.*|repo_icon: "icon.png"|g' config.yml

          # Update the passwords in config.yml so fdroid can read the keystore
          echo "Configuring persistent keystore password..."
          # Replace keystorepass and keypass in config.yml (handles commented out templates)
          sed -i "s|^#*[[:space:]]*keystorepass:.*|keystorepass: \"$FDROID_KEYSTORE_PASSWORD\"|g" config.yml
          sed -i "s|^#*[[:space:]]*keypass:.*|keypass: \"$FDROID_KEYSTORE_PASSWORD\"|g" config.yml

          # Place custom repository icons
          mkdir -p repo/icons
          # Copy standard fallback icons in all possible expected locations to eliminate fdroidserver warnings
          cp ../public/fdroid-icon.png repo/icons/icon.png
          cp ../public/fdroid-icon.png repo/icons/icon-64.png
          cp ../public/fdroid-icon.png repo/icons/org.openanchor.alarm.png
          cp ../public/fdroid-icon.png icon.png
          cp ../public/fdroid-icon.png repo/icon.png

          # Generate index (signs repository using decoded persistent repo.keystore)
          fdroid update --use-date-from-apk --create-metadata

          echo "--- repo contents ---"
          ls -la repo/
          echo "--- metadata contents ---"
          ls -la metadata/ 2>/dev/null || echo "(no metadata)"

      - name: Prepare Pages artifact
        run: |
          # Create clean output structure
          mkdir -p pages/fdroid
          
          # Copy the entire F-Droid repo folder recursively (includes index-v1.jar, index-v2.json, APKs, index.png, index.css, icons, etc.)
          cp -r fdroid-build/repo pages/fdroid/
          
          # Place the repository logo in the parent directory of the repo folder to prevent it from being parsed as a ghost app
          cp public/fdroid-icon.png pages/fdroid/logo.png
          
          # Copy the standard F-Droid landing page and all associated assets (index.css, index.png, etc.) to the root so the root renders it fully styled with QR code
          cp fdroid-build/repo/index.html pages/index.html
          cp fdroid-build/repo/*.css pages/ 2>/dev/null || true
          cp fdroid-build/repo/*.png pages/ 2>/dev/null || true
          cp fdroid-build/repo/*.ico pages/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
