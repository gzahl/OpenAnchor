name: Build APK & Deploy F-Droid Repo

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and sign APK
        run: |
          cd android
          chmod +x gradlew
          # Build debug APK (pre-signed with Android debug key, valid for fdroid)
          ./gradlew assembleDebug
          mkdir -p $GITHUB_WORKSPACE/apk
          cp app/build/outputs/apk/debug/app-debug.apk \
            $GITHUB_WORKSPACE/apk/openanchor.apk

      - name: Install fdroidserver
        run: pip install fdroidserver

      - name: Build F-Droid repo
        run: |
          set -e
          # Create a clean build directory for fdroid
          mkdir -p fdroid-build/repo fdroid-build/metadata
          cp apk/openanchor.apk fdroid-build/repo/
          cd fdroid-build

          # Initialize repo config (uses separate keystore for repo index signing)
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          fdroid init \
            --keystore repo.keystore \
            --repo-keyalias fdroid-repo \
            --no-prompt

          # Generate index (creates repo signing key in repo.keystore)
          fdroid update --create-key --use-date-from-apk --create-metadata

          echo "--- repo contents ---"
          ls -la repo/
          echo "--- metadata contents ---"
          ls -la metadata/ 2>/dev/null || echo "(no metadata)"

      - name: Prepare Pages artifact
        run: |
          # Create clean output structure
          mkdir -p pages/fdroid
          # Copy the entire F-Droid repo folder recursively (includes index-v1.jar, index-v2.json, APKs, icons, etc.)
          cp -r fdroid-build/repo pages/fdroid/
          # Create landing page
          REPO_URL="https://gzahl.github.io/OpenAnchor/fdroid/repo"
          QR_URL="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=$REPO_URL"
          cat > pages/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OpenAnchor – F-Droid Repo</title>
            <style>
              body { font-family: system-ui, sans-serif; background: #0b0e1a; color: #e0e6f0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
              .card { background: #131827; border: 1px solid #2a3350; border-radius: 16px; padding: 3rem; text-align: center; max-width: 480px; }
              h1 { font-size: 1.8rem; margin: 0 0 0.5rem; color: #05ffb0; }
              p { color: #8c9bb4; line-height: 1.5; }
              code { display: inline-block; background: #1a2238; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; word-break: break-all; }
              a { color: #05ffb0; }
              .badge { display: inline-block; background: #1a2238; border-radius: 6px; padding: 0.35rem 0.75rem; font-size: 0.8rem; margin-top: 1rem; }
              .qr { margin: 1.5rem 0; }
              .qr img { border-radius: 12px; max-width: 100%; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>⚓ OpenAnchor</h1>
              <p>F-Droid repository for the OpenAnchor anchor alarm app.</p>
              <div class="qr"><img src="$QR_URL" alt="QR Code" width="250" height="250"></div>
              <p>Scan with F-Droid client, or add manually:</p>
              <code>$REPO_URL</code>
              <br><br>
              <a href="fdroid/repo/">Browse repository</a>
              <div class="badge">✓ F-Droid Repo</div>
            </div>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
